name: Build Windows EXE

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Convert PNG to ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('Bybit.png').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          img.save('Bybit.ico', format='ICO', sizes=sizes)
          print('Bybit.ico created')
          "

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --icon=Bybit.ico `
            --add-data "Bybit.png;." `
            --add-data "Bybit.ico;." `
            --name BytbitManager `
            native_desktop_app.py

      - name: Upload EXE as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BytbitManager-windows
          path: dist/BytbitManager.exe
          retention-days: 30

      # Only publish a GitHub Release when a version tag is pushed (e.g. v1.0.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BytbitManager.exe
          generate_release_notes: true
